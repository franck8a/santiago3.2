<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Santiago's Web Browser Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .draggable {
            cursor: move;
            transition: transform 0.2s;
            touch-action: none; /* Vital para que el móvil no intente hacer scroll al tocarlo */
            user-select: none;
        }
        .drop-zone {
            border: 2px dashed #94a3b8;
            background-color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
        }
        .drop-zone.active {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.2);
            transform: scale(1.05);
        }
        .correct {
            border-color: #22c55e !important;
            background-color: rgba(34, 197, 94, 0.2) !important;
            box-shadow: none !important;
        }
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0.5); }
            100% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans p-2 md:p-8 overflow-x-hidden">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-blue-600 p-4 md:p-6 text-white text-center">
            <h1 class="text-2xl md:text-3xl font-bold">Web Browser 🚀</h1>
            <p class="text-sm md:text-base mt-1 text-blue-100">¡Santiago, arrastra las palabras a su lugar!</p>
        </div>

        <div class="p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 order-2 lg:order-1">
                <h2 class="text-lg font-semibold text-slate-700 mb-3">Options:</h2>
                <div id="labels-container" class="flex flex-wrap lg:flex-col gap-2"></div>
            </div>

            <div class="lg:col-span-3 order-1 lg:order-2">
                <div class="bg-slate-200 p-2 md:p-4 rounded-t-xl border border-slate-300 relative">
                    <div class="flex items-center gap-1 mb-3">
                        <div class="bg-white px-3 py-1 rounded-t-lg text-[10px] md:text-xs border-t border-x border-slate-300 flex items-center gap-2">
                            <span>Google.com</span>
                            <div id="target-close" class="drop-zone w-5 h-5 rounded-full flex items-center justify-center pulse" data-part="close new tabs">×</div>
                        </div>
                        <div id="target-open" class="drop-zone w-6 h-6 rounded-md flex items-center justify-center bg-slate-300 font-bold pulse" data-part="open new tabs">+</div>
                    </div>

                    <div class="flex items-center gap-2 bg-white p-2 rounded-lg border border-slate-300 shadow-sm">
                        <div class="flex gap-1">
                            <div id="target-backward" class="drop-zone w-8 h-8 rounded-full flex items-center justify-center bg-slate-50 pulse" data-part="backward">⬅️</div>
                            <div id="target-forward" class="drop-zone w-8 h-8 rounded-full flex items-center justify-center bg-slate-50 pulse" data-part="forward">➡️</div>
                        </div>
                        <div id="target-address" class="drop-zone flex-grow h-8 rounded-md flex items-center px-2 text-[10px] md:text-sm text-slate-400 italic pulse" data-part="address bars">https://www.google.com</div>
                        <div id="target-bookmarks" class="drop-zone w-8 h-8 rounded-full flex items-center justify-center bg-slate-50 pulse" data-part="bookmarks">⭐</div>
                    </div>

                    <div class="flex justify-center">
                        <div id="target-suggestions" class="drop-zone w-11/12 p-3 rounded-b-lg border-x border-b border-slate-200 bg-white text-[10px] md:text-xs space-y-1 pulse" data-part="suggestions">
                            <div class="border-b pb-1 text-blue-500">🔍 How to play chess...</div>
                            <div class="text-blue-500">🔍 Origami for kids...</div>
                        </div>
                    </div>
                </div>
                <div class="bg-white h-40 md:h-64 border-x border-b border-slate-300 rounded-b-xl flex items-center justify-center text-slate-200">
                    <p class="text-sm italic">Page Content</p>
                </div>
            </div>
        </div>
    </div>

    <div id="success-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-2xl font-bold mb-2">¡Increíble, Santiago!</h2>
            <p class="text-slate-600 mb-6">Dominas el navegador como un profesional.</p>
            <button onclick="resetGame()" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-full w-full">Jugar otra vez</button>
        </div>
    </div>

    <script>
        const parts = ["bookmarks", "address bars", "suggestions", "forward", "backward", "open new tabs", "close new tabs"];
        let correctCount = 0;

        function initGame() {
            const container = document.getElementById('labels-container');
            container.innerHTML = '';
            correctCount = 0;
            [...parts].sort(() => Math.random() - 0.5).forEach(part => {
                const el = document.createElement('div');
                el.className = 'draggable bg-white border-2 border-blue-500 text-blue-700 px-3 py-2 rounded-lg font-bold shadow-md text-sm md:text-base';
                el.textContent = part;
                el.id = `label-${part.replace(/\s/g, '-')}`;
                el.draggable = true;
                
                el.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('text/plain', part);
                    e.dataTransfer.setData('sourceId', el.id);
                });

                // Eventos de Toque mejorados
                el.addEventListener('touchstart', handleTouchStart, {passive: false});
                el.addEventListener('touchmove', handleTouchMove, {passive: false});
                el.addEventListener('touchend', handleTouchEnd);
                
                container.appendChild(el);
            });

            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.classList.remove('correct', 'pulse');
                zone.classList.add('pulse');
                zone.addEventListener('dragover', e => e.preventDefault());
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    const partName = e.dataTransfer.getData('text/plain');
                    const sourceId = e.dataTransfer.getData('sourceId');
                    checkMatch(partName, sourceId, zone);
                });
            });
        }

        let touchEl = null;
        let startX, startY;

        function handleTouchStart(e) {
            touchEl = e.currentTarget;
            const touch = e.touches[0];
            startX = touch.clientX - touchEl.offsetLeft;
            startY = touch.clientY - touchEl.offsetTop;
            touchEl.style.zIndex = "1000";
            touchEl.style.position = "absolute";
        }

        function handleTouchMove(e) {
            if (!touchEl) return;
            e.preventDefault();
            const touch = e.touches[0];
            touchEl.style.left = (touch.clientX - startX) + 'px';
            touchEl.style.top = (touch.clientY - startY) + 'px';
            
            // Feedback visual de zona activa
            const target = getTargetZone(touch);
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));
            if (target) target.classList.add('active');
        }

        function handleTouchEnd(e) {
            if (!touchEl) return;
            const touch = e.changedTouches[0];
            const target = getTargetZone(touch);
            
            if (target) {
                checkMatch(touchEl.textContent, touchEl.id, target);
            }
            
            if (!target || !target.classList.contains('correct')) {
                touchEl.style.position = "static";
                touchEl.style.zIndex = "auto";
            }
            
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));
            touchEl = null;
        }

        function getTargetZone(touch) {
            // Ocultamos el elemento arrastrado un milisegundo para ver qué hay debajo
            touchEl.hidden = true;
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            touchEl.hidden = false;
            return el ? el.closest('.drop-zone') : null;
        }

        function checkMatch(name, sourceId, zone) {
            if (zone.dataset.part === name && !zone.classList.contains('correct')) {
                zone.classList.add('correct');
                zone.classList.remove('pulse', 'active');
                zone.innerHTML = `<span class="text-green-700 text-[10px] md:text-xs">✓ ${name.toUpperCase()}</span>`;
                document.getElementById(sourceId).style.display = 'none';
                correctCount++;
                if (correctCount === parts.length) {
                    document.getElementById('success-modal').classList.remove('hidden');
                }
            }
        }

        function resetGame() {
            location.reload();
        }

        window.onload = initGame;
    </script>
</body>
</html>
